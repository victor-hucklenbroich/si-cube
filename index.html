<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silicon Cube — Miller Index Viewer</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="canvas-container">
    <div id="toolbar">
      <button id="btn-lang" onclick="switchLanguage()" title="Deutsch / English"></button>
      <button id="btn-theme" onclick="switchTheme()" title="Light / Dark"></button>
    </div>
  </div>

  <div id="side-panel">
    <div id="panel-header">
      <h1 data-i18n="title"></h1>
      <p class="subtitle" data-i18n="subtitle"></p>
    </div>

    <div id="current-face">
      <div class="hud-label" data-i18n="facing"></div>
      <div style="display:flex;align-items:baseline;gap:12px;">
        <div id="facing-index" class="miller-big">(1 0 0)</div>
        <div id="facing-family" class="family-tag family-100">{100}</div>
      </div>
    </div>

    <div id="angle-table">
      <div class="hud-label" data-i18n="angles"></div>
      <div id="angle-list"></div>
    </div>

    <div id="panel-footer">
      <div id="legend">
        <div class="legend-item"><span class="swatch-100"></span><span class="fam">{100}</span></div>
        <div class="legend-item"><span class="swatch-110"></span><span class="fam">{110}</span></div>
        <div class="legend-item"><span class="swatch-111"></span><span class="fam">{111}</span></div>
      </div>
      <button id="reset-btn" onclick="resetCamera()" data-i18n="center"></button>
    </div>
  </div>

  <div id="controls-hint">
    <span>◧</span>
    <span data-i18n="rotate"></span>
    &nbsp;
    <span>◨</span>
    <span data-i18n="pan"></span>
    &nbsp;
    <span>◎</span>
    <span data-i18n="zoom"></span>
  </div>

  <script type="module" src="js/app.js"></script>

  <div id="version-text">
    <span>v1.0.0-SNAPSHOT</span>
  </div>

</body>
</html>
